<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Neon Magenta Gradient -->
    <linearGradient id="neonMagenta" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Neon Cyan Gradient -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="1" stroke-opacity="0.5" />
    </pattern>
    <filter id="glowMagenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Background Card -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" stroke="#1e1b4b" stroke-width="4" />
  
  <!-- Cyberpunk Retro Grid -->
  <rect width="512" height="512" rx="96" fill="url(#grid)" />
  
  <!-- Isometric Rising stairs + Neon Arrow / academic leveling staircase -->
  <g transform="translate(116, 116)">
    <!-- Cyan stair blocks ascending from bottom-left to top-right -->
    <!-- Block 1 -->
    <rect x="20" y="200" width="60" height="60" rx="8" fill="url(#neonCyan)" opacity="0.8" />
    <!-- Block 2 -->
    <rect x="80" y="140" width="60" height="120" rx="8" fill="url(#neonCyan)" opacity="0.9" />
    <!-- Block 3 -->
    <rect x="140" y="80" width="60" height="180" rx="8" fill="url(#neonCyan)" />
    
    <!-- Neon Ascent Arrow (Magenta glow) -->
    <path d="M 60,210 L 220,50 L 150,50 M 220,50 L 220,120" 
          fill="none" 
          stroke="url(#neonMagenta)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glowMagenta)" />
          
    <path d="M 60,210 L 220,50 L 150,50 M 220,50 L 220,120" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
  
  <!-- Glowing horizontal tech horizon lines -->
  <line x1="48" y1="420" x2="464" y2="420" stroke="#ff00ff" stroke-width="4" opacity="0.6" stroke-dasharray="16 8" />
  <line x1="48" y1="432" x2="464" y2="432" stroke="#00ffff" stroke-width="2" opacity="0.4" stroke-dasharray="8 4" />
  
  <!-- Elevated Lettering or dynamic title overlay -->
  <text x="256" y="475" fill="#ffffff" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" letter-spacing="8" opacity="0.9">E L E V A T E U</text>
</svg>
